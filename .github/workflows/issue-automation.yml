name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Create required labels if missing
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              // Category labels
              { name: 'bug', color: 'd73a4a', description: 'Something isn't working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              // Priority labels
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1c', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffdd57', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'c2e0c6', description: 'Low priority issue' },
              // Status labels
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '009800', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '6f42c1', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                console.log(`Label ${label.name} already exists`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label ${label.name}`);
                } else {
                  throw error;
                }
              }
            }

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              ...issue,
              labels: ['needs-triage']
            });

            // Assign category labels based on title
            const categoryLabels = [];
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                ...issue,
                labels: categoryLabels
              });
            }

            // Assign priority labels (highest priority wins)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // default
            for (const pk of priorityKeywords) {
              const hasKeyword = pk.keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                priorityLabel = pk.label;
                break; // highest priority first
              }
            }

            await github.rest.issues.addLabels({
              ...issue,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: ${{ contains(github.event.issue.title.toLowerCase(), 'epic') }}
    steps:
      - name: Create epic sub-tasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const parentTitle = issue.title;
            const parentNumber = issue.number;

            // Sub-task details
            const subTasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create sub-issues and collect their numbers
            const subIssueNumbers = [];
            for (let i = 0; i < subTasks.length; i++) {
              const task = subTasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
              console.log(`Created sub-issue #${subIssue.data.number}: ${subTitle}`);
            }

            // Update parent issue body with Epic Tasks checklist
            const currentBody = issue.body || '';
            const checklist = `\n## Epic Tasks\n${subIssueNumbers.map(num => `- [ ] #${num}`).join('\n')}`;
            const newBody = currentBody + checklist;

            await github.rest.issues.update({
              ...issue,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: ${{ always() }} # Run even if task-breakdown is skipped
    steps:
      - name: Check if first-time contributor in repo
        uses: actions/github-script@v7
        id: first-time
        with:
          script: |
            const issue = context.issue;
            const author = issue.user.login;

            // Get list of issues created by the author in this repo
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });

            // Check if this is their first issue (only 1 issue, which is the current one)
            const isFirstTime = issues.data.length === 1;
            return isFirstTime;

      - name: Add first-time-contributor label and welcome message
        uses: actions/github-script@v7
        if: ${{ steps.first-time.outputs.result == 'true' }}
        with:
          script: |
            const issue = context.issue;

            // Add label
            await github.rest.issues.addLabels({
              ...issue,
              labels: ['first-time-contributor']
            });

            // Post welcome message
            const welcomeMsg = `Welcome @${issue.user.login}! This is your first issue in this repository. We appreciate your contribution and will review it soon.`;
            await github.rest.issues.createComment({
              ...issue,
              body: welcomeMsg
            });

      - name: Post response based on issue type
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const labels = issue.labels.map(l => l.name.toLowerCase());

            let response = '';
            if (labels.includes('bug')) {
              response = '### Bug Report Guidelines\nPlease ensure you have provided:\n1. Clear description of the bug\n2. Steps to reproduce\n3. Expected vs actual behavior\n4. Screenshots (if applicable)\n5. Environment details (Node.js version, OS, etc.)';
            } else if (labels.includes('epic')) {
              response = '### Feature Request Process\nThis epic will be broken down into sub-tasks. We will review the requirements and provide updates soon.';
            } else if (labels.includes('maintenance')) {
              response = '### Maintenance Guidelines\nPlease provide details on the scope and impact of this maintenance task.';
            }

            if (response) {
              await github.rest.issues.createComment({
                ...issue,
                body: response
              });
            }

      - name: Set milestone for high/critical priority
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const labels = issue.labels.map(l => l.name.toLowerCase());

            // Check if milestone "v1.0.0" exists, create if not
            let milestone;
            try {
              // Try to get milestone by title
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              milestone = milestones.data.find(m => m.title === 'v1.0.0');
            } catch (error) {
              throw error;
            }

            if (!milestone) {
              // Create milestone if not exists
              milestone = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'v1.0.0',
                description: 'Initial release milestone'
              });
            }

            // Set milestone for high/critical
            if (labels.includes('priority-critical') || labels.includes('priority-high')) {
              await github.rest.issues.update({
                ...issue,
                milestone: milestone.data ? milestone.data.number : milestone.number
              });
            }

      - name: Update status from needs-triage to needs-review
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;

            // Remove needs-triage label
            await github.rest.issues.removeLabel({
              ...issue,
              name: 'needs-triage'
            });

            // Add needs-review label
            await github.rest.issues.addLabels({
              ...issue,
              labels: ['needs-review']
            });